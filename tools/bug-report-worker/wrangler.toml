name = "openmyst-bug-report"
main = "worker.ts"
compatibility_date = "2025-01-01"

# Set these via `wrangler secret put` — do NOT commit them.
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put SHARED_SECRET    # optional, raises the spam bar
