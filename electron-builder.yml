appId: org.openmyst.app
productName: Open Myst
copyright: Copyright © 2026 Open Myst

directories:
  output: release/${version}
  buildResources: build

# electron-vite emits main/preload/renderer into out/ — ship that plus
# package.json. node_modules is pulled in automatically by electron-builder.
files:
  - out/**/*
  - package.json
  - '!**/*.map'
  - '!**/*.md'

# Explicitly unpacked binaries from native deps (pdf-parse has none, but
# this keeps room for future additions).
asarUnpack: []

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Signed + notarized build. Requires a Developer ID Application cert
  # in the keychain and the APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD env
  # vars for notarization.
  identity: "Arsh Chawla (3J9KC6LRM3)"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize:
    teamId: 3J9KC6LRM3
  # Register the `openmyst://` URL scheme so the OS launches the app
  # when the browser redirects to `openmyst://auth-callback?state=...&token=...`
  # at the end of the sign-in flow (changes.md §2.1).
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLName: Open Myst
        CFBundleURLSchemes:
          - openmyst

dmg:
  artifactName: ${productName}-${version}-${arch}.dmg

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  # Register the `openmyst://` scheme in HKCU so Windows launches the
  # desktop app when the browser hits openmyst://auth-callback.
  include: build/installer.nsh

protocols:
  - name: Open Myst
    schemes:
      - openmyst

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
  artifactName: ${productName}-${version}-${arch}.${ext}
  # The `protocols:` block above also writes a MimeType=x-scheme-handler/openmyst
  # entry into the .desktop file for the Linux AppImage.

# Disable auto-publishing — we only want local artifacts.
publish: null
